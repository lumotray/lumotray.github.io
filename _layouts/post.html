<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="https://lumotray.com/assets/css/bs-home.min.css">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  {% feed_meta %}
</head>
<body>
  {% include header.html %}

  <main class="page-content">
    <div class="container py-4">
      <div class="row">
        <div class="col-lg-8">
          <article>
            <h1 class="post-title mb-3">{{ page.title | escape }}</h1>
            <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
            <hr class="my-4">
            <div class="post-body">
              {{ content }}
            </div>
            <hr class="my-4">
            <p><a href="{{ '/' | relative_url }}" class="text-decoration-none">&larr; Back to all posts</a></p>
          </article>
        </div>
        <div class="col-lg-4">
          <div class="sticky-top" style="top: 2rem;">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-body">
                <h5 class="card-title fw-bold">About</h5>
                <p class="card-text text-muted">The official LumoTray blog — updates, tips, and news about the Windows 11 tray app.</p>
                <a href="https://lumotray.com" target="_blank" class="text-decoration-none">Visit LumoTray ↗</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  {% include footer.html %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
