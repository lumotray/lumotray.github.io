<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
  {% include head.html %}
</head>
<body class="blog-site">
  {% include header.html %}

  <main class="page-content">
    <div class="container py-5">
      <article class="post-wrapper">
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          <ol>
            <li><a href="{{ '/' | relative_url }}">Blog</a></li>
            {% if page.category %}
            <li><a href="{{ '/' | append: page.category | append: '/' | relative_url }}">{{ page.category | capitalize }}</a></li>
            {% endif %}
            <li aria-current="page">{{ page.title | escape }}</li>
          </ol>
        </nav>

        <div class="content-card post-content">
          <div class="post-body">
            {{ content }}
          </div>
        </div>

        <p class="back-link"><a href="{{ '/' | relative_url }}">← Back to all posts</a></p>
      </article>
    </div>
  </main>

  {% include footer.html %}
</body>
</html>
