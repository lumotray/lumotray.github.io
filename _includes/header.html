<header class="blog-hero">
  <div class="container">
    <nav class="navbar navbar-dark navbar-expand-sm fw-semibold">
      <a class="navbar-brand d-flex align-items-center ps-md-4" href="https://lumotray.com/">
        <img src="{{ '/assets/gfx/lumotray.png' | relative_url }}" width="50" height="50" alt="LumoTray">
        <h1>LumoTray</h1>
      </a>
      <div class="ms-auto d-none d-md-block" id="navbarContent">
        <ul id="nav" class="navbar-nav navbar-dark ms-auto me-5">
          <li class="nav-item"><a href="https://lumotray.com/" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="https://lumotray.com/#overview" class="nav-link">Overview</a></li>
          <li class="nav-item"><a href="https://lumotray.com/#license" class="nav-link">Buy</a></li>
          <li class="nav-item"><a href="{{ '/' | relative_url }}" class="nav-link active">Blog</a></li>
        </ul>
      </div>
    </nav>

    <div class="blog-hero-content text-light text-center">
      {% if page.layout == 'post' %}
      <h1>{{ page.title | escape }}</h1>
      <p class="lead">{{ page.date | date: "%B %-d, %Y" }}</p>
      {% else %}
      <p class="eyebrow">LumoTray Blog</p>
      <h1>{{ page.hero_title | default: site.title }}</h1>
      <p class="lead">{{ page.hero_subtitle | default: site.description }}</p>
      {% endif %}
    </div>
  </div>
</header>
